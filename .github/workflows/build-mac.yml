name: Build macOS (.dmg)

# Собирает Mac-версию установщика на облачном macOS-раннере GitHub.
# Запуск: вкладка Actions -> "Build macOS (.dmg)" -> Run workflow.
# Артефакт (.dmg) появится в результатах запуска (Artifacts). Без подписи (v1).

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write   # публикация dmg в Release (не artifact — квота)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Fetch latest config (bundle into installer)
        run: npm run fetch:config

      - name: Fetch macOS vendor (full offline — apps, wheels, Chromium)
        env:
          # Приватный репо Nomad-агента (JHamidun/nomad) — клонируется на раннере с токеном
          # из секрета. Без него компонент Nomad делает graceful skip (dmg без агента).
          NOMAD_AGENT_GIT_URL: ${{ secrets.NOMAD_AGENT_GIT_URL }}
          # Аутентификация к api.github.com (маскот-релизы, шрифт): анонимный лимит на
          # shared-IP раннера → транзиентные 403 → FATAL. С токеном лимит на порядки выше.
          GITHUB_TOKEN: ${{ github.token }}
        run: bash tools/fetch-vendor-mac.sh

      - name: Validate bundled git (dugite)
        run: |
          set -e
          TGZ="vendor/apps/git-macos-arm64.tar.gz"
          [ -s "$TGZ" ] || { echo "нет $TGZ"; exit 1; }
          G="$RUNNER_TEMP/hm-git"; rm -rf "$G"; mkdir -p "$G"
          tar -xzf "$TGZ" -C "$G"
          xattr -dr com.apple.quarantine "$G" 2>/dev/null || true
          export GIT_EXEC_PATH="$G/libexec/git-core"
          export GIT_TEMPLATE_DIR="$G/share/git-core/templates"
          export GIT_CONFIG_SYSTEM="$G/etc/gitconfig"
          echo "arch раннера: $(uname -m)"
          "$G/bin/git" --version
          # реальный сценарий: init + commit + clone по https (TLS через системный libcurl)
          T="$RUNNER_TEMP/gt"; rm -rf "$T"; mkdir -p "$T"; cd "$T"
          "$G/bin/git" init -q . && echo "x" > a.txt && "$G/bin/git" add a.txt
          "$G/bin/git" -c user.email=t@t -c user.name=t commit -qm t
          "$G/bin/git" clone -q --depth 1 https://github.com/desktop/dugite-native.git d && echo "https-clone OK"
          echo "ВШИТЫЙ GIT РАБОТАЕТ на $(uname -m)"

      # Записываем App Store Connect API-ключ (.p8) из secret в файл для notarytool.
      # Секрет — через env-блок, НЕ интерполяцией в run-текст (анти-паттерн: значение
      # попадает в сгенерированный скрипт шага; при set -x/ошибке шаблона риск утечки).
      - name: Prepare notarization API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build .dmg (Developer ID signed + notarized, universal full-offline)
        env:
          # Подпись: electron-builder возьмёт .p12 из CSC_LINK (base64) + пароль.
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          # Нотаризация через notarytool + App Store Connect API-ключ.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --universal --publish never

      # electron-builder нотаризовал+застейплил ЧИСТЫЙ .app (без vendor — иначе notary
      # ругается на неподписанные .so в .whl). Финальный dmg с офлайн-vendor собираем
      # САМИ через hdiutil: том нужного размера (electron-builder сайзит только под .app
      # → ENOSPC на 1ГБ vendor). Нотаризованный app запускается чисто; dmg подписываем
      # Developer ID (сам dmg не нотаризуем — vendor бы завалил, а app и так застейплен).
      - name: Assemble final dmg (notarized app + offline vendor)
        env:
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
        run: |
          set -e
          APP="release/mac-universal/Hamidun Setup.app"
          [ -d "$APP" ] || { echo "нет .app от electron-builder"; exit 1; }
          echo "=== lipo -archs на Electron-бинаре (MUST быть arm64 + x86_64) ==="
          EXEBIN="$APP/Contents/MacOS/Hamidun Setup"
          [ -f "$EXEBIN" ] || EXEBIN="$(ls "$APP/Contents/MacOS/" | head -n1 | sed "s#^#$APP/Contents/MacOS/#")"
          EXEARCHS=$(lipo -archs "$EXEBIN" || echo "?")
          echo "archs: $EXEARCHS"
          echo "$EXEARCHS" | grep -q arm64  || { echo "FATAL: нет arm64 слайса"; exit 1; }
          echo "$EXEARCHS" | grep -q x86_64 || { echo "FATAL: нет x86_64 слайса — .app не universal"; exit 1; }
          echo "=== staple нотаризации на .app ==="
          xcrun stapler validate "$APP" && echo "STAPLED OK" || echo "WARN: staple не подтверждён (app всё равно нотаризован в БД Apple)"
          # keychain для подписи dmg (кейчейн electron-builder уже мог быть удалён)
          KC="$RUNNER_TEMP/dmgsign.keychain-db"; KP="hmpw$RANDOM"
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings "$KC"
          security unlock-keychain -p "$KP" "$KC"
          echo "$APPLE_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/idcert.p12"
          security import "$RUNNER_TEMP/idcert.p12" -k "$KC" -P "$APPLE_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)
          # стейджинг: нотаризованный app + vendor + инструкция + ярлык Applications
          ST="$RUNNER_TEMP/dmgstage"; rm -rf "$ST"; mkdir -p "$ST"
          cp -R "$APP" "$ST/"
          cp -R vendor "$ST/vendor"
          cp "assets/mac/ПРОЧТИ ЕСЛИ ПИШЕТ ПОВРЕЖДЕНО.txt" "$ST/" 2>/dev/null || true
          ln -s /Applications "$ST/Applications"
          OUT="release/Hamidun-Setup-Mac.dmg"; rm -f "$OUT"
          echo "=== hdiutil create (том сам под размер контента) ==="
          # hdiutil периодически падает "Resource busy" на свежескопированном 2.7ГБ vendor
          # (Spotlight/индексация держит ресурс) — ретраим с detach стейл-маунтов + паузой.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "Hamidun Setup" -srcfolder "$ST" -fs HFS+ -format UDZO -ov "$OUT"; then
              echo "hdiutil create OK (попытка $attempt)"; break
            fi
            echo "hdiutil create failed (попытка $attempt: Resource busy?) — detach + пауза"
            hdiutil detach "/Volumes/Hamidun Setup" -force 2>/dev/null || true
            rm -f "$OUT"; sync; sleep 15
            [ "$attempt" = 5 ] && { echo "hdiutil create: все 5 попыток исчерпаны"; exit 1; }
          done
          echo "=== подпись dmg Developer ID ==="
          codesign --force --timestamp --sign "Developer ID Application: Jemal Mohamed Lemine (3VN93XA9DY)" --keychain "$KC" "$OUT"
          codesign --verify --verbose "$OUT"
          ls -la "$OUT"

      # Universal dmg ~2.7 ГБ > 2 GiB — лимит ассета GitHub Release (HTTP 422). Заливаем
      # напрямую в Reg.ru S3 (без лимита, основное RU-зеркало). boto3 upload_file = multipart
      # (как медиа лендинга через _deploy_vibe.put — проверено на Reg.ru). GitHub Release
      # остаётся как УКАЗАТЕЛЬ на S3-ссылку (сам dmg туда не влезает).
      - name: Upload universal dmg to Reg.ru S3
        env:
          REGRU_S3_ACCESS_KEY: ${{ secrets.REGRU_S3_ACCESS_KEY }}
          REGRU_S3_SECRET_KEY: ${{ secrets.REGRU_S3_SECRET_KEY }}
          REGRU_S3_ENDPOINT: ${{ secrets.REGRU_S3_ENDPOINT }}
          REGRU_S3_BUCKET: ${{ secrets.REGRU_S3_BUCKET }}
          REGRU_S3_REGION: ${{ secrets.REGRU_S3_REGION }}
        run: |
          set -e
          ls -la release/*.dmg
          # macOS-раннер: системный python3 externally-managed (PEP 668) → нужен
          # --break-system-packages. Ставим boto3 только если его нет.
          python3 -c "import boto3" 2>/dev/null || python3 -m pip install --quiet --break-system-packages boto3
          python3 - <<'PY'
          import os, boto3
          from boto3.s3.transfer import TransferConfig
          s3 = boto3.client('s3', endpoint_url=os.environ['REGRU_S3_ENDPOINT'],
              aws_access_key_id=os.environ['REGRU_S3_ACCESS_KEY'],
              aws_secret_access_key=os.environ['REGRU_S3_SECRET_KEY'],
              region_name=os.environ['REGRU_S3_REGION'])
          key = 'vibecoding/downloads/Hamidun-Setup-Mac.dmg'
          bucket = os.environ['REGRU_S3_BUCKET']
          # Квота бакета ~10ГБ: overwrite 2.7ГБ поверх старого dmg требует 2x места →
          # QuotaExceeded. Поэтому: (1) abort брошенных multipart-частей (едят квоту
          # невидимо), (2) удалить старый dmg, (3) залить новый. Окно недоступности
          # ~3 мин приемлемо (есть зеркало Я.Диск в fallback-ссылках лендинга).
          for u in s3.list_multipart_uploads(Bucket=bucket).get('Uploads', []):
              s3.abort_multipart_upload(Bucket=bucket, Key=u['Key'], UploadId=u['UploadId'])
              print('aborted orphan multipart:', u['Key'])
          s3.delete_object(Bucket=bucket, Key=key)
          print('old dmg deleted')
          cfg = TransferConfig(multipart_threshold=64*1024*1024, multipart_chunksize=64*1024*1024, use_threads=True)
          s3.upload_file('release/Hamidun-Setup-Mac.dmg', bucket, key,
              ExtraArgs={'ACL': 'public-read', 'ContentType': 'application/x-apple-diskimage'}, Config=cfg)
          print('S3 OK:', os.environ['REGRU_S3_ENDPOINT'] + '/' + os.environ['REGRU_S3_BUCKET'] + '/' + key)
          PY

      - name: Publish GitHub Release pointer (S3 link)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="mac-build-${{ github.run_number }}"
          URL="https://s3.regru.cloud/hamidun-academy-materials/vibecoding/downloads/Hamidun-Setup-Mac.dmg"
          # sha256 dmg в notes: пользователю есть чем проверить 2.7 ГБ загрузку с S3.
          DMG_SHA256=$(shasum -a 256 "release/Hamidun-Setup-Mac.dmg" | awk '{print $1}')
          echo "dmg sha256: $DMG_SHA256"
          NOTES="Universal (arm64 + x86_64) macOS installer — работает нативно на Apple Silicon и Intel.

          Скачать: $URL

          SHA-256: \`$DMG_SHA256\`
          Проверка после скачивания: \`shasum -a 256 Hamidun-Setup-Mac.dmg\` — хеш обязан совпасть.

          (Сам .dmg ~2.7 ГБ живёт на Reg.ru S3 — превышает лимит ассета GitHub Release 2 GiB.)"
          gh release create "$TAG" --title "Hamidun-Setup-Mac universal (run ${{ github.run_number }})" --notes "$NOTES" \
            || gh release edit "$TAG" --title "Hamidun-Setup-Mac universal (run ${{ github.run_number }})" --notes "$NOTES"
